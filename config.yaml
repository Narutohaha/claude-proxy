# Claude Proxy 配置文件

server:
  host: "0.0.0.0"
  port: 3456

storage:
  path: "./data/proxy.db"

logging:
  level: "info"
  format: "text"

# API 提供商配置
# type: anthropic (Claude API 格式) 或 openai (OpenAI API 格式)
# auth_type: header (x-api-key) 或 bearer (Authorization: Bearer)
providers:
  jdcloud:
    type: "anthropic"
    base_url: "https://modelservice.jdcloud.com/coding/anthropic"
    api_key: ""
    auth_type: "bearer"

  zhipucloud:
    type: "anthropic"
    base_url: "https://open.bigmodel.cn/api/anthropic"
    api_key: ""
    auth_type: "bearer"

# 自定义模型配置（供 Claude Code 使用）
custom_models:
  - name: "Thinking-Model"
    provider: "jdcloud"
    model: "GLM-5"
    description: "GLM-5"

  - name: "Sonnet-Model"
    provider: "jdcloud"
    model: "GLM-5"
    description: "GLM-5"   

  - name: "Opus-Model"
    provider: "jdcloud"
    model: "GLM-5"
    description: "GLM-5"

  - name: "Haiku-Model"
    provider: "jdcloud"
    model: "DeepSeek-V3.2"
    description: "DeepSeek-V3.2"

# 路由规则（按顺序匹配，用于未在 custom_models 中定义的模型）
routes:
  - pattern: "*"
    provider: "jdcloud"
